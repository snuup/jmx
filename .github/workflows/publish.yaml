name: Publish to npm

on:
  push:
    branches: ["master"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          # Required for Changesets to detect git history
          fetch-depth: 0

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Verify npm config
        run: |
          echo "Registry: $(npm config get registry)"
          echo "Scoped registry: $(npm config get @snupo:registry)"
          npm view @snupo/vite-plugin-jmx --json || echo "Package not published yet"



      # --- Changesets Version & Publish ---
      - name: Publish
        uses: changesets/action@v1
        with:
          # This will publish to npm if on master (no PR needed)
          publish: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed for PRs/releases